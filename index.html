<!DOCTYPE html>
<html lang="en">
  <head>
  <!-- build: pablo-sig-2 -->
  <script>
    (function(){
      if(!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.getRegistrations().then(function(regs){
        var killed = regs.length > 0;
        var p = regs.map(function(r){ return r.unregister(); });
        return Promise.all(p).then(function(){
          return caches.keys();
        }).then(function(keys){
          return Promise.all(keys.map(function(k){ return caches.delete(k); }));
        }).then(function(){
          if(killed && !sessionStorage.getItem('sw_nuked_app')){
            sessionStorage.setItem('sw_nuked_app','1');
            location.reload();
          }
        });
      }).catch(function(){});
    })();
  </script>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <meta name="theme-color" content="#0F1419" />
    <meta name="description" content="AuditDNA - Mexausa Food Group Agricultural Intelligence Platform" />
    <title>AuditDNA - Mexausa Food Group</title>

    <!-- AuditDNA branding - REPLACES React default favicon -->
    <link rel="icon" type="image/png" href="/AuditDNALOGO.png" />
    <link rel="apple-touch-icon" href="/AuditDNALOGO.png" />
    <link rel="shortcut icon" href="/AuditDNALOGO.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Anti-flash splash: prevents white screen + React logo from showing during initial render -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #000000;
        color: #ffffff;
        font-family: 'Segoe UI', -apple-system, sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
      }
      /* Pre-React splash - shows AuditDNA branding instead of white-flash + React logo */
      #auditdna-splash {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000000;
        transition: opacity 0.4s ease;
      }
      #auditdna-splash.fade {
        opacity: 0;
        pointer-events: none;
      }
      #auditdna-splash .logo-wrap {
        width: 140px;
        height: 140px;
        border-radius: 0;
        background: transparent;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 18px;
        box-shadow: none;
      }
      #auditdna-splash .logo-wrap img {
        width: 140px;
        height: 140px;
        object-fit: contain;
      }
      #auditdna-splash .brand {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 4px;
        color: #ffffff;
        margin-bottom: 4px;
      }
      #auditdna-splash .sub {
        font-size: 11px;
        color: rgba(255,255,255,0.55);
        letter-spacing: 2px;
        font-weight: 600;
        text-transform: uppercase;
      }
      #auditdna-splash .accent {
        margin-top: 18px;
        width: 140px;
        height: 2px;
        background: linear-gradient(90deg, transparent 0%, #C9A55C 50%, transparent 100%);
      }
      /* Block any stray React/Create-React-App default elements just in case */
      .App-logo, .App-header > img, .App-link {
        display: none !important;
      }
    </style>
  </head>
  <body style="margin:0;padding:0;background:#0F1419;color:#e2e8f0;">
    <noscript>You need to enable JavaScript to run AuditDNA.</noscript>
    <div id="auditdna-splash">
      <div class="logo-wrap">
        <img src="/AuditDNALOGO.png" alt="AuditDNA" onerror="this.style.display='none'" />
      </div>
      <div class="brand">AUDITDNA</div>
      <div class="sub">Mexausa Food Group</div>
      <div class="accent"></div>
    </div>
    <div id="root"></div>
    <script>
      // Fade out the splash once React mounts
      (function () {
        var fadeOut = function () {
          var s = document.getElementById('auditdna-splash');
          if (s) {
            s.classList.add('fade');
            setTimeout(function () { if (s.parentNode) s.parentNode.removeChild(s); }, 500);
          }
        };
        // Wait for React to render something inside #root
        var observer = new MutationObserver(function (mutations) {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            observer.disconnect();
            setTimeout(fadeOut, 200);
          }
        });
        var root = document.getElementById('root');
        if (root) observer.observe(root, { childList: true });
        // Hard timeout fallback - never block past 8 seconds
        setTimeout(fadeOut, 8000);
      })();
    </script>
  </body>
</html>
