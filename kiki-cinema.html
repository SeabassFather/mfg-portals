<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate"/>
<title>🎬 Para Mi Jefe Kiki Gavilán</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{
  --bg:#0a0a0f;
  --card:#13131a;
  --card2:#1a1a24;
  --gold:#f5c518;
  --red:#e50914;
  --text:#ffffff;
  --muted:#94a3b8;
  --border:rgba(245,197,24,0.2);
  --radius:12px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* GATE */
#gate{position:fixed;inset:0;background:linear-gradient(135deg,#0a0a0f 0%,#1a0a1a 50%,#0a0a0f 100%);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:0}
.gate-inner{background:rgba(255,255,255,0.03);border:1px solid rgba(245,197,24,0.3);border-radius:20px;padding:40px 32px;width:320px;text-align:center}
.gate-title{font-size:28px;font-weight:900;color:var(--gold);letter-spacing:2px;margin-bottom:4px}
.gate-sub{font-size:11px;color:var(--muted);letter-spacing:3px;margin-bottom:28px}
.gate-dedication{font-size:13px;color:rgba(255,255,255,0.5);font-style:italic;margin-bottom:28px;line-height:1.5}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.nb{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:22px;font-weight:600;border-radius:12px;padding:16px 0;cursor:pointer;transition:all 0.15s;font-family:inherit}
.nb:active,.nb:hover{background:rgba(245,197,24,0.15);border-color:var(--gold);color:var(--gold)}
.pd-dots{display:flex;justify-content:center;gap:12px;margin-bottom:16px;height:20px}
.pd{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.2);transition:all 0.2s}.pd.on{background:#C9A55C!important;border-color:#C9A55C!important;}
.pd.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(245,197,24,0.4)}
.pd.error{background:#ef4444;border-color:#ef4444}
.gate-err{font-size:11px;color:#ef4444;min-height:16px;margin-bottom:8px}
.gate-clear{font-size:9px;color:rgba(255,255,255,0.15);cursor:pointer;letter-spacing:1px;text-decoration:none;display:block}

/* APP */
#app{display:none;min-height:100vh}

/* TOPBAR */
.topbar{background:rgba(10,10,15,0.95);border-bottom:1px solid rgba(245,197,24,0.15);padding:0 16px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.logo-area{display:flex;flex-direction:column;flex:1}
.logo-name{font-size:15px;font-weight:900;color:var(--gold);letter-spacing:1px}
.logo-sub{font-size:8px;color:var(--muted);letter-spacing:2px}
.lang-btn{padding:4px 10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--muted);font-size:10px;font-weight:700;border-radius:20px;cursor:pointer;letter-spacing:1px}
.lang-btn.on{background:rgba(245,197,24,0.15);border-color:var(--gold);color:var(--gold)}

/* SEARCH */
.search-bar{padding:12px 16px;background:rgba(19,19,26,0.9);border-bottom:1px solid rgba(255,255,255,0.05)}
.search-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:10px 16px 10px 40px;border-radius:25px;font-size:13px;outline:none;font-family:inherit}
.search-wrap{position:relative}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}

/* GENRE PILLS */
.genre-scroll{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;border-bottom:1px solid rgba(255,255,255,0.04)}
.genre-scroll::-webkit-scrollbar{display:none}
.genre-pill{white-space:nowrap;padding:6px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-size:11px;font-weight:700;border-radius:20px;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;flex-shrink:0}
.genre-pill.on{background:var(--red);border-color:var(--red);color:#fff}

/* FEATURED HERO */
.hero{position:relative;height:220px;overflow:hidden;margin-bottom:0}
.hero-img{width:100%;height:100%;object-fit:cover}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(10,10,15,0.3) 60%,transparent 100%)}
.hero-content{position:absolute;bottom:16px;left:16px;right:16px}
.hero-badge{display:inline-block;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;letter-spacing:2px;margin-bottom:6px}
.hero-title{font-size:22px;font-weight:900;margin-bottom:4px;text-shadow:0 2px 8px rgba(0,0,0,0.8)}
.hero-meta{font-size:11px;color:rgba(255,255,255,0.7);display:flex;gap:8px;align-items:center}
.star{color:var(--gold)}

/* SECTION */
.section{padding:16px}
.section-title{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* MOVIE GRID */
.movie-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.movie-card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform 0.2s;border:1px solid rgba(255,255,255,0.05)}
.movie-card:active{transform:scale(0.97)}
.movie-poster{width:100%;aspect-ratio:2/3;object-fit:cover;background:#1a1a2e}
.movie-info{padding:8px 8px 10px}
.movie-title{font-size:11px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.movie-year{font-size:9px;color:var(--muted)}
.movie-rating{font-size:9px;color:var(--gold);font-weight:700}

/* MOVIE DETAIL MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;overflow-y:auto;display:none}
.modal.open{display:block}
.modal-inner{max-width:480px;margin:0 auto;padding-bottom:40px}
.modal-poster-wrap{position:relative;height:280px}
.modal-poster{width:100%;height:100%;object-fit:cover}
.modal-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.95) 0%,transparent 60%)}
.modal-close{position:absolute;top:12px;left:12px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:18px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
.modal-fav{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:18px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
.modal-body{padding:16px}
.modal-title{font-size:22px;font-weight:900;margin-bottom:6px}
.modal-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;font-size:11px;color:var(--muted)}
.tag{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);padding:3px 8px;border-radius:4px;font-size:10px}
.modal-plot{font-size:13px;color:rgba(255,255,255,0.8);line-height:1.7;margin-bottom:16px}
.modal-cast{font-size:11px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.modal-actions{display:flex;gap:10px}
.btn-trailer{flex:1;padding:12px;background:var(--red);border:none;color:#fff;font-size:12px;font-weight:700;border-radius:8px;cursor:pointer;letter-spacing:1px;font-family:inherit}
.btn-fav{padding:12px 16px;background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.3);color:var(--gold);font-size:12px;font-weight:700;border-radius:8px;cursor:pointer;letter-spacing:1px;font-family:inherit}

/* TRAILER MODAL */
.trailer-modal{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center}
.trailer-modal.open{display:flex}
.trailer-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:20px;width:40px;height:40px;border-radius:50%;cursor:pointer}
.trailer-frame{width:100%;max-width:480px;aspect-ratio:16/9;border:none;border-radius:8px}

/* WATCHLIST */
.watchlist-btn{position:fixed;bottom:20px;right:16px;background:var(--gold);color:#0a0a0f;width:50px;height:50px;border-radius:50%;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(245,197,24,0.4);z-index:150;display:flex;align-items:center;justify-content:center}
.watchlist-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:9px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;flex-direction:column;gap:12px;color:var(--muted);font-size:12px}
.spinner{width:32px;height:32px;border:3px solid rgba(245,197,24,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,0.97);border-top:1px solid rgba(245,197,24,0.15);display:flex;z-index:160;backdrop-filter:blur(12px);padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;border:none;background:none;color:var(--muted);font-size:9px;font-weight:700;letter-spacing:0.5px;gap:3px;transition:color 0.2s;font-family:inherit}
.nav-btn.on{color:var(--gold)}
.nav-btn .nav-icon{font-size:20px;line-height:1}
#app{padding-bottom:70px}
.watchlist-btn{bottom:80px}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(245,197,24,0.9);color:#0a0a0f;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:700;z-index:500;pointer-events:none;opacity:0;transition:opacity 0.3s;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>

on;">7</button><button onclick="np('8')" ontouchend="this.click()" style="padding:14px;border-radius:8px;border:1px solid rgba(201,165,92,0.2);background:rgba(201,165,92,0.05);color:#e2e8f0;font-size:16px;font-weight:700;cursor:pointer;user-select:none;touch-action:manipulation;">8</button><button onclick="np('9')" ontouchend="this.click()" style="padding:14px;border-radius:8px;border:1px solid rgba(201,165,92,0.2);background:rgba(201,165,92,0.05);color:#e2e8f0;font-size:16px;font-weight:700;cursor:pointer;user-select:none;touch-action:manipulation;">9</button><button onclick="np('del')" ontouchend="this.click()" style="padding:14px;border-radius:8px;border:1px solid rgba(201,165,92,0.2);background:rgba(201,165,92,0.05);color:#e2e8f0;font-size:16px;font-weight:700;cursor:pointer;user-select:none;touch-action:manipulation;">⌫</button><button onclick="np('0')" ontouchend="this.click()" style="padding:14px;border-radius:8px;border:1px solid rgba(201,165,92,0.2);background:rgba(201,165,92,0.05);color:#e2e8f0;font-size:16px;font-weight:700;cursor:pointer;user-select:none;touch-action:manipulation;">0</button><button onclick="np('ok')" ontouchend="this.click()" style="padding:14px;border-radius:8px;border:1px solid rgba(201,165,92,0.4);background:linear-gradient(135deg,#C9A55C,#8a6930);color:#020912;font-size:13px;font-weight:800;cursor:pointer;user-select:none;">OK</button></div>

var NOVELA_FILTER_ID = 'novelas';



async function tmdb(path, params){
  var url = TMDB_BASE + path + '?api_key=' + TMDB_KEY + '&language=' + (lang==='es'?'es-MX':'en-US');
  if(params) url += '&' + params;
  var controller = new AbortController();
  var timeout = setTimeout(function(){ controller.abort(); }, 3000);
  try {
    var r = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    return r.json();
  } catch(e) {
    clearTimeout(timeout);
    throw e;
  }
}

})();

function kp(v){
  if(v==='clr'){pinBuf='';updateDots();document.getElementById('gate-err').textContent='';return;}
  if(v==='del'){pinBuf=pinBuf.slice(0,-1);updateDots();return;}
  if(pinBuf.length>=4) return;
  pinBuf+=v;
  updateDots();
  if(pinBuf.length===4){
    if(pinBuf===PIN){
      localStorage.setItem('kiki_auth','1');
      document.getElementById('gate').style.display='none';
      document.getElementById('app').style.display='block';
      var bn=document.getElementById('bottom-nav'); if(bn) bn.style.display='flex';
      var wf=document.getElementById('watchlist-fab'); if(wf) wf.style.display='flex';
      setTimeout(init, 200);
    } else {
      document.querySelectorAll('.pd').forEach(function(d){d.className='pd error';});
      document.getElementById('gate-err').textContent=lang==='es'?'PIN incorrecto — intenta de nuevo':'Wrong PIN — try again';
      setTimeout(function(){pinBuf='';updateDots();document.getElementById('gate-err').textContent='';},900);
    }
  }
}

function buildGenres(){
  var el=document.getElementById('genre-scroll');
  el.innerHTML=GENRES.map(function(g){
    return '<div class="genre-pill'+(g.id===activeGenre?' on':'')+'" onclick="selectGenre(\''+g.id+'\')">'+(lang==='es'?g.es:g.en)+'</div>';
  }).join('');
}

function selectGenre(id){
  activeGenre=id;
  buildGenres();
  if(id==='novelas'){
    var novelas=FALLBACK_MOVIES.filter(function(m){return m.novela;});
    renderMovies(novelas);
  } else {
    loadMovies(id, searchQ);
  }
}

// ── MOVIES ────────────────────────────────────
async function loadMovies(genreId, query){
  var mc=document.getElementById('main-content');
  // Only show spinner if no content yet
  if(!mc.innerHTML || mc.innerHTML.indexOf('movie-card')<0){
    mc.innerHTML='<div class="loading"><div class="spinner"></div><span>'+t('loading')+'</span></div>';
  }
  try {
    var data;
    if(query && query.trim().length > 1){
      data = await tmdb('/search/movie','query='+encodeURIComponent(query)+'&page=1');
    } else if(genreId==='all'){
      data = await tmdb('/movie/popular','page=1');
    } else {
      data = await tmdb('/discover/movie','with_genres='+genreId+'&sort_by=popularity.desc&page=1');
    }

    allMovies = (data.results||[]).filter(function(m){return m.poster_path;});
    renderMovies(allMovies);
  } catch(e){
    console.warn('[Kiki] TMDB fetch failed:', e.message, '— using fallback');
    var filtered = genreId && genreId!=='all'
      ? FALLBACK_MOVIES.filter(function(m){ return m.genre_ids && m.genre_ids.includes(parseInt(genreId)); })
      : FALLBACK_MOVIES;
    if(!filtered.length) filtered = FALLBACK_MOVIES;
    renderMovies(filtered);
  }
}

function renderMovies(movies){
  var mc=document.getElementById('main-content');
  if(!movies.length){
    mc.innerHTML='<div class="loading">'+t('noResults')+'</div>';
    return;
  }

  // Featured hero = first movie
  var hero = movies[0];
  var heroBg = hero.backdrop_path ? 'https://image.tmdb.org/t/p/w780'+hero.backdrop_path : (hero.poster_path ? TMDB_IMG+hero.poster_path : '');
  var heroRating = hero.vote_average ? hero.vote_average.toFixed(1) : '?';
  
  var html = '';
  
  if(heroBg){
    regMovie(hero);
  html += '<div class="hero" onclick="openMovieById('+hero.id+',getMovie('+hero.id+'))">'
      +'<img class="hero-img" src="'+heroBg+'" loading="lazy"/>'
      +'<div class="hero-grad"></div>'
      +'<div class="hero-content">'
        +'<div class="hero-badge">FEATURED</div>'
        +'<div class="hero-title">'+(lang==='es'&&hero.title?hero.title:hero.title)+'</div>'
        +'<div class="hero-meta">'
          +'<span class="star">★ '+heroRating+'</span>'
          +'<span>'+( hero.release_date?hero.release_date.slice(0,4):'')+'</span>'
        +'</div>'
      +'</div>'
    +'</div>';
  }

  html += '<div class="section">';
  html += '<div class="section-title">🎬 '+(searchQ&&searchQ.length>1?'RESULTS':'MOVIES')+'<span style="color:#475569;font-weight:400">'+movies.length+'</span></div>';
  html += '<div class="movie-grid">';
  
  movies.forEach(function(m){
    if(!m.poster_path) return;
    var rating = m.vote_average ? m.vote_average.toFixed(1) : '';
    var year = m.release_date ? m.release_date.slice(0,4) : '';
    var isFav = watchlist.some(function(w){return w.id===m.id;});
    regMovie(m);
    html += '<div class="movie-card" onclick="openMovieById('+m.id+',getMovie('+m.id+'))">'
      +'<div style="position:relative">'
        +'<img class="movie-poster" src="'+TMDB_IMG+m.poster_path+'" loading="lazy" alt="'+m.title+'">'
        +(isFav?'<div style="position:absolute;top:4px;right:4px;font-size:14px">❤️</div>':'')
      +'</div>'
      +'<div class="movie-info">'
        +'<div class="movie-title">'+m.title+'</div>'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px">'
          +'<span class="movie-year">'+year+'</span>'
          +(rating?'<span class="movie-rating">★'+rating+'</span>':'')
        +'</div>'
      +'</div>'
    +'</div>';
  });

  html += '</div></div>';
  mc.innerHTML = html;
}

// ── MOVIE DETAIL ──────────────────────────────
async function openMovieById(id, basic){
  currentMovie = basic;
  openMovieBasic(basic);
  // Load full details
  try {
    var data = await tmdb('/movie/'+id,'append_to_response=credits,videos');
    currentMovie = Object.assign({}, basic, data);
    updateModalFull(data);
  } catch(e){}
}

function openMovie(m){
  openMovieById(m.id, m);
}


function populateWatchLinks(movie) {
  if(!movie) return;
  // Show PLAY FULL MOVIE if Archive.org has it
  var archiveId = getArchiveId(movie.title||'');
  var playBtn = document.getElementById('play-full-btn');
  if(playBtn) playBtn.style.display = archiveId ? 'block' : 'none';
  var title = encodeURIComponent(movie.title + (movie.release_date ? ' ' + movie.release_date.slice(0,4) : ''));
  var titleRaw = movie.title || '';
  
  // YouTube - search for full movie
  var yt = document.getElementById('wl-youtube');
  if(yt) yt.href = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(titleRaw + ' full movie');
  
  // Google search
  var gl = document.getElementById('wl-google');
  if(gl) gl.href = 'https://www.google.com/search?q=' + encodeURIComponent('watch ' + titleRaw + ' online free');
  
  // Netflix search
  var nf = document.getElementById('wl-netflix');
  if(nf){ nf.href = 'https://www.netflix.com/search?q=' + encodeURIComponent(titleRaw); nf.style.display='inline'; }
  
  // Prime search  
  var pr = document.getElementById('wl-prime');
  if(pr){ pr.href = 'https://www.amazon.com/s?k=' + encodeURIComponent(titleRaw) + '&i=instant-video'; pr.style.display='inline'; }
}
function openMovieBasic(m){
  document.getElementById('modal-poster').src = m.backdrop_path ? TMDB_IMG_ORIG+m.backdrop_path : TMDB_IMG+m.poster_path;
  document.getElementById('modal-title').textContent = m.title;
  document.getElementById('modal-plot').textContent = m.overview || (lang==='es'?'Sin descripción disponible.':'No description available.');
  document.getElementById('modal-meta').innerHTML = [
    m.release_date?'<span class="tag">'+m.release_date.slice(0,4)+'</span>':'',
    m.vote_average?'<span class="tag">★ '+m.vote_average.toFixed(1)+'</span>':'',
  ].filter(Boolean).join('');
  document.getElementById('modal-cast').textContent = '';
  document.getElementById('trailer-btn').textContent = '▶ '+t('trailer');
  
  var isFav = watchlist.some(function(w){return w.id===m.id;});
  document.getElementById('modal-fav-btn').textContent = isFav?'❤️':'🤍';
  document.getElementById('fav-btn-text').textContent = isFav?t('saved2'):('🤍 '+t('save'));
  
  document.getElementById('movie-modal').className='modal open';
  document.body.style.overflow='hidden';
  populateWatchLinks(m);
}

function updateModalFull(data){
  if(!currentMovie) return;
  
  // Genres
  var genreNames = (data.genres||[]).map(function(g){return lang==='es'?g.name:g.name;}).join(', ');
  var runtime = data.runtime?data.runtime+'min':'';
  var meta = [
    data.release_date?'<span class="tag">'+data.release_date.slice(0,4)+'</span>':'',
    data.vote_average?'<span class="tag">★ '+data.vote_average.toFixed(1)+'</span>':'',
    runtime?'<span class="tag">'+runtime+'</span>':'',
    genreNames?'<span class="tag">'+genreNames+'</span>':'',
  ].filter(Boolean).join('');
  document.getElementById('modal-meta').innerHTML=meta;

  // Director + cast
  var director = (data.credits&&data.credits.crew||[]).find(function(c){return c.job==='Director';});
  var cast = (data.credits&&data.credits.cast||[]).slice(0,6).map(function(c){return c.name;}).join(', ');
  var castStr = (director?t('director')+' '+director.name+'\n':'') + (cast?t('cast')+' '+cast:'');
  document.getElementById('modal-cast').textContent = castStr;
  
  // Store for trailer
  currentMovie.videos = data.videos;
}

function closeModal(){
  document.getElementById('movie-modal').className='modal';
  document.body.style.overflow='';
  currentMovie=null;
}

// ── TRAILER ───────────────────────────────────
function playTrailer(){
  if(!currentMovie) return;
  var videos = currentMovie.videos&&currentMovie.videos.results||[];
  var trailer = videos.find(function(v){return v.type==='Trailer'&&v.site==='YouTube';})
    || videos.find(function(v){return v.site==='YouTube';});
  if(trailer){
    document.getElementById('trailer-frame').src='https://www.youtube.com/embed/'+trailer.key+'?autoplay=1&rel=0';
    document.getElementById('trailer-modal').className='trailer-modal open';
  } else {
    // Search YouTube
    var q=encodeURIComponent((currentMovie.title||'')+(currentMovie.release_date?' '+currentMovie.release_date.slice(0,4):'')+' official trailer');
    window.open('https://www.youtube.com/results?search_query='+q,'_blank');
  }
}

function closeTrailer(){
  document.getElementById('trailer-frame').src='';
  document.getElementById('trailer-modal').className='trailer-modal';
}

// ── FAVORITES ─────────────────────────────────
function toggleFav(){
  if(!currentMovie) return;
  var idx=watchlist.findIndex(function(w){return w.id===currentMovie.id;});
  if(idx>-1){
    watchlist.splice(idx,1);
    showToast(t('removed'));
    document.getElementById('modal-fav-btn').textContent='🤍';
    document.getElementById('fav-btn-text').textContent='🤍 '+t('save');
  } else {
    watchlist.push({id:currentMovie.id,title:currentMovie.title,poster_path:currentMovie.poster_path,vote_average:currentMovie.vote_average,release_date:currentMovie.release_date});
    showToast(t('saved'));
    document.getElementById('modal-fav-btn').textContent='❤️';
    document.getElementById('fav-btn-text').textContent=t('saved2');
  }
  localStorage.setItem('kiki_watchlist',JSON.stringify(watchlist));
  updateWLBadge();
}

function updateWLBadge(){
  var badge=document.getElementById('wl-badge');
  if(watchlist.length>0){
    badge.style.display='flex';
    badge.textContent=watchlist.length>9?'9+':watchlist.length;
  } else {
    badge.style.display='none';
  }
}

// ── WATCHLIST VIEW ────────────────────────────
function showWatchlist(){
  if(!watchlist.length){
    showToast(t('empty'));
    return;
  }
  renderMovies(watchlist);
  document.getElementById('search-in').value='';
  searchQ='';
  activeGenre='all';
  buildGenres();
  window.scrollTo({top:0,behavior:'smooth'});
  showToast('❤️ '+t('watchlist')+' ('+watchlist.length+')');
}

// ── TOAST ─────────────────────────────────────
function showToast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show';
  setTimeout(function(){el.className='toast';},2500);
}

var currentNav = 'home';
function navGo(tab, el){
  currentNav = tab;
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('on'); });
  if(el) el.classList.add('on');
  var searchBar = document.querySelector('.search-bar');
  var genreScroll = document.getElementById('genre-scroll');
  if(tab==='home'){
    if(searchBar) searchBar.style.display='block';
    if(genreScroll) genreScroll.style.display='flex';
    document.getElementById('search-in').value='';
    searchQ=''; activeGenre='all';
    buildGenres(); loadMovies('all','');
  } else if(tab==='search'){
    if(searchBar) searchBar.style.display='block';
    if(genreScroll) genreScroll.style.display='none';
    document.getElementById('search-in').focus();
  } else if(tab==='genres'){
    if(searchBar) searchBar.style.display='none';
    if(genreScroll) genreScroll.style.display='none';
    showGenreGrid();
  } else if(tab==='watchlist'){
    if(searchBar) searchBar.style.display='none';
    if(genreScroll) genreScroll.style.display='none';
    showWatchlistPage();
  } else if(tab==='toprated'){
    if(searchBar) searchBar.style.display='none';
    if(genreScroll) genreScroll.style.display='none';
    loadTopRated();
  }
}

function genreEmoji(id){
  var map={'novelas':'📺','28':'💥','35':'😂','18':'🎭','27':'👻','10749':'💕','878':'🚀','16':'✨','99':'🎥','53':'😱','80':'🔫','12':'🗺️','14':'🧙','10751':'👨‍👩‍👧','36':'⚔️','37':'🤠','10402':'🎵','10752':'🪖','9648':'🔍'};
  return map[id]||'🎬';
}

function showGenreGrid(){
  var mc = document.getElementById('main-content');
  var colors=['#e50914','#f5c518','#1db954','#4a9eff','#ff6b6b','#c084fc','#fb923c','#34d399','#f472b6','#60a5fa','#a78bfa','#fbbf24','#4ade80','#f87171','#38bdf8','#e879f9','#fb7185','#818cf8'];

var ARCHIVE_IDS = {
  // Classic Horror
  'Dracula': 'dracula-colorized',
  'Frankenstein': 'frankenstein-1931-colorized',
  'The Wolf Man': 'wolf-man-1941',
  'Invasion of the Body Snatchers': 'invasion-of-the-body-snatchers-1956-colo',
  // Classic Sci-Fi
  'The Day the Earth Stood Still': 'day-the-earth-stood-still-1951',
  'Earth vs the Flying Saucers': 'earth-vs-the-flying-saucers-color',
  'Tarantula': 'tarantula-1955-colorized',
  // Classic Action/Western
  'War of the Wildcats': 'WarOfTheWildcats-JohnWayne1943',
  'Sahara': 'sahara-colorized',
  'The Train': 'train-1964',
  // Classic Comedy
  'His Girl Friday': 'HisGirlFriday1940_201505',
  'Abbott and Costello Meet the Invisible Man': 'AbbottCostelloMeetTheInvisibleMan',
  // Horror
  'Army of Darkness': 'army-of-darkness-directors-cut',
  'Night of the Living Dead': 'george-a-romeros-night-of-the-living-dead',
  // Action
  'Godzilla': 'the-return-of-godzilla',
  // Music
  'Let It Be': 'Let_It_Be_1970_film',
  // Sherlock Holmes
  'Sherlock Holmes': 'sherlock-holmes-movies-colorized',
};

function getArchiveId(title) {
  if(!title) return null;
  // Direct match
  if(ARCHIVE_IDS[title]) return ARCHIVE_IDS[title];
  // Partial match
  var keys = Object.keys(ARCHIVE_IDS);
  for(var i=0;i<keys.length;i++){
    if(title.toLowerCase().indexOf(keys[i].toLowerCase())>=0 || 
       keys[i].toLowerCase().indexOf(title.toLowerCase())>=0) {
      return ARCHIVE_IDS[keys[i]];
    }
  }
  return null;
}


function playFullMovie(){
  if(!currentMovie) return;
  var archiveId = getArchiveId(currentMovie.title);
  if(!archiveId) {
    // Fallback: search Archive.org
    window.open('https://archive.org/search?query=' + encodeURIComponent(currentMovie.title) + '+full+movie&and[]=mediatype%3A%22movies%22','_blank');
    return;
  }
  document.getElementById('fullmovie-title').textContent = currentMovie.title;
  document.getElementById('fullmovie-frame').src = 'https://archive.org/embed/' + archiveId + '?autoplay=1';
  document.getElementById('fullmovie-modal').className='trailer-modal open';
}

function closeFullMovie(){
  document.getElementById('fullmovie-frame').src='';
  document.getElementById('fullmovie-modal').className='trailer-modal';
}

function init(){
  FALLBACK_MOVIES.forEach(function(m){MOVIE_REGISTRY[m.id]=m;});
  updateWLBadge();
  buildGenres();
  // Show ALL fallback movies immediately — always visible
  renderMovies(FALLBACK_MOVIES);
  // Try TMDB in background — only replaces if successful
  loadMoviesBackground('all');
}

async function loadMoviesBackground(genreId){
  try {
    var data = await tmdb('/movie/popular','page=1');
    var movies = (data.results||[]).filter(function(m){return m.poster_path;});
    if(movies && movies.length > 0) {
      allMovies = movies;
      renderMovies(movies);
    }
  } catch(e){
    // Keep fallback showing — do nothing
    console.log('[Kiki] TMDB unavailable, showing local catalog');
  }
}
