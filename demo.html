<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AuditDNA Agricultural Intelligence — Platform Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#E8B84B;--green:#1db954;--red:#ff4d4d;
  --bg:#080808;--bg2:#111;--bg3:#0a0a0a;
  --card:#161616;--card2:#1c1c1c;
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.06);
  --txt:#f2f2f2;--txt2:#a0a0a0;--txt3:#5a5a5a;
}
html,body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5}
@keyframes tkscroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes pls{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.6)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* TOP BAR */
.topbar{background:#0a0a0a;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px;position:sticky;top:0;z-index:50}
.tb-logo{display:flex;align-items:center;gap:10px}
.tb-mark{width:32px;height:32px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#080808;flex-shrink:0}
.tb-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:.3px}
.tb-sub{font-size:10px;color:var(--txt3);margin-top:1px}
.tb-badge{display:flex;align-items:center;gap:5px;background:rgba(29,185,84,0.12);border:1px solid rgba(29,185,84,0.30);border-radius:99px;padding:4px 11px}
.tb-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pls 1.8s ease-in-out infinite;flex-shrink:0}
.tb-live{font-size:10px;color:var(--green);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.tb-enter{padding:6px 16px;background:var(--gold);border:none;border-radius:6px;font-size:11px;font-weight:700;color:#080808;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.3px}

/* TICKER */
.ticker{background:#050505;border-bottom:1px solid var(--border2);height:26px;overflow:hidden;position:relative}
.ticker::before,.ticker::after{content:'';position:absolute;width:40px;height:100%;z-index:2;top:0}
.ticker::before{left:0;background:linear-gradient(90deg,#050505,transparent)}
.ticker::after{right:0;background:linear-gradient(270deg,#050505,transparent)}
.tk-inner{display:flex;white-space:nowrap;height:100%;align-items:center;animation:tkscroll 32s linear infinite}
.ti{display:inline-flex;align-items:center;gap:4px;padding:0 12px;border-right:1px solid rgba(255,255,255,0.05)}
.ti-l{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.ti-v{font-size:11px;font-weight:700;color:var(--gold)}
.ti-c{font-size:9px;font-weight:600}
.up{color:#1db954}.dn{color:#ff4d4d}

/* DEMO WRAP */
.wrap{max-width:1000px;margin:0 auto;padding:24px 20px 48px}

/* HEADER */
.demo-hdr{text-align:center;margin-bottom:24px}
.demo-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(29,185,84,0.10);border:1px solid rgba(29,185,84,0.25);border-radius:99px;padding:5px 14px;margin-bottom:14px}
.demo-badge-t{font-size:10px;color:var(--green);letter-spacing:2px;text-transform:uppercase;font-weight:600}
.demo-h1{font-size:clamp(24px,4vw,42px);font-weight:800;color:#fff;letter-spacing:-1.5px;line-height:1.05;margin-bottom:8px}
.demo-h1 span{color:var(--gold)}
.demo-sub{font-size:13px;color:var(--txt2);letter-spacing:.2px}

/* AUTO BAR */
.auto-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px}
.auto-pill{display:flex;align-items:center;gap:6px;background:rgba(29,185,84,0.08);border:1px solid rgba(29,185,84,0.22);border-radius:99px;padding:5px 14px}
.auto-pill-t{font-size:10px;color:var(--green);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.pause-btn{padding:5px 16px;background:var(--card2);border:1px solid var(--border);border-radius:99px;font-size:10px;color:var(--txt2);cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.5px;transition:all .15s}
.pause-btn:hover{border-color:rgba(255,255,255,0.25);color:#fff}
.pause-btn.paused{background:rgba(232,184,75,0.10);border-color:rgba(232,184,75,0.30);color:var(--gold)}

/* STEP NAV */
.step-nav{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.step-btn{padding:6px 14px;background:var(--card);border:1px solid var(--border2);border-radius:6px;font-size:10px;color:var(--txt3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .18s;white-space:nowrap;font-weight:500}
.step-btn.active{background:var(--green);border-color:var(--green);color:#080808;font-weight:700}
.step-btn.done{border-color:rgba(232,184,75,0.30);color:var(--gold)}
.step-btn:hover:not(.active){border-color:rgba(255,255,255,0.20);color:#fff}

/* PROGRESS */
.prog-wrap{height:3px;background:rgba(255,255,255,0.06);border-radius:99px;margin-bottom:12px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:99px;transition:width .5s ease}
.auto-prog-wrap{height:2px;background:rgba(255,255,255,0.04);border-radius:99px;margin-bottom:16px;overflow:hidden}
.auto-prog-fill{height:100%;background:linear-gradient(90deg,rgba(29,185,84,0.5),rgba(232,184,75,0.5));border-radius:99px}

/* SCREEN */
.screen{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;animation:fadeIn .3s ease}

/* BOTTOM NAV */
.bot-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--bg3);border-top:1px solid var(--border2)}
.btn-prev{padding:8px 20px;background:transparent;border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.btn-prev:hover{border-color:rgba(255,255,255,0.25);color:#fff}
.btn-next{padding:8px 22px;background:var(--green);border:none;border-radius:6px;font-size:11px;font-weight:700;color:#080808;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.btn-next:hover{opacity:.88;transform:scale(1.02)}
.bot-label{font-size:10px;color:var(--txt3);letter-spacing:.5px;text-align:center;line-height:1.4}

/* SCREEN INTERNALS */
.s-pad{padding:24px 24px}
.sec-tag{display:inline-flex;align-items:center;gap:7px;margin-bottom:10px}
.sec-tag-line{display:block;width:14px;height:1.5px;background:var(--gold)}
.sec-tag-t{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.s-h{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px;line-height:1.15;margin-bottom:16px}
.s-sub{font-size:13px;color:var(--txt2);margin-bottom:18px;line-height:1.6}

/* CARDS & GRIDS */
.card{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:14px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.row:last-child{border-bottom:none}
.row-k{font-size:11px;color:var(--txt2);font-weight:500}
.row-v{font-size:12px;font-weight:700}
.pill{display:inline-block;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.3px}
.pg{background:rgba(29,185,84,0.14);color:#1db954;border:1px solid rgba(29,185,84,0.28)}
.pa{background:rgba(232,184,75,0.12);color:#E8B84B;border:1px solid rgba(232,184,75,0.25)}
.pb{background:rgba(100,160,255,0.12);color:#80b0ff;border:1px solid rgba(100,160,255,0.22)}
.mini-chart{display:flex;align-items:flex-end;gap:2px;height:30px;margin-top:8px}
.mc-bar{flex:1;border-radius:1px 1px 0 0}
@media(max-width:600px){.g5{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
</style>
</head>

var cur=0,autoplay=true,autoTimer=null,progTimer=null,INTERVAL=5000;

function render(){
  var els={screen:'screen',prog:'prog',label:'bot-label',next:'btn-next',prev:'btn-prev',nav:'stepnav'};
  var ok=true;Object.keys(els).forEach(function(k){if(!document.getElementById(els[k]))ok=false;});
  if(!ok)return;
  document.getElementById('screen').innerHTML=SCREENS[cur].html();
  document.getElementById('prog').style.width=Math.round((cur+1)/SCREENS.length*100)+'%';
  document.getElementById('bot-label').innerHTML='Screen '+(cur+1)+' of '+SCREENS.length+'<br><span style="color:#333">'+SCREENS[cur].desc+'</span>';
  document.getElementById('btn-next').textContent=cur===SCREENS.length-1?'↺ Restart':'Next →';
  document.getElementById('btn-prev').style.opacity=cur===0?'0.3':'1';
  var nav=document.getElementById('stepnav');nav.innerHTML='';
  SCREENS.forEach(function(s,i){
    var b=document.createElement('button');b.className='step-btn'+(i===cur?' active':i<cur?' done':'');
    b.textContent=(i<cur?'✓ ':'')+s.title;b.onclick=function(){cur=i;render();resetTimer();};nav.appendChild(b);
  });
}

function nav(dir){
  if(dir===1&&cur===SCREENS.length-1)cur=0;
  else if(dir===-1&&cur===0)return;
  else cur+=dir;
  render();resetTimer();
}

function resetTimer(){
  if(autoTimer)clearTimeout(autoTimer);if(progTimer)clearInterval(progTimer);
  var f=document.getElementById('auto-prog');if(f){f.style.transition='none';f.style.width='0%';}
  if(!autoplay)return;
  var start=Date.now();
  progTimer=setInterval(function(){var pct=Math.min((Date.now()-start)/INTERVAL*100,100);var f=document.getElementById('auto-prog');if(f){f.style.transition='none';f.style.width=pct+'%';}},50);
  autoTimer=setTimeout(function(){if(cur===SCREENS.length-1)cur=0;else cur++;render();resetTimer();},INTERVAL);
}

function toggleAuto(){
  autoplay=!autoplay;
  var btn=document.getElementById('pause-btn');var st=document.getElementById('auto-status');var f=document.getElementById('auto-prog');
  if(autoplay){btn.textContent='⏸ Pause';btn.classList.remove('paused');if(st)st.textContent='Auto-playing · 5s per screen';resetTimer();}
  else{if(autoTimer)clearTimeout(autoTimer);if(progTimer)clearInterval(progTimer);btn.textContent='▶ Play';btn.classList.add('paused');if(st)st.textContent='Paused — click to resume';if(f){f.style.transition='none';f.style.width='0%';}}
}

// TICKER
var tkHTML='';[...TICKERS,...TICKERS].forEach(function(t){
  tkHTML+='<div class="ti"><span class="ti-l '+(t.u?'up':'dn')+'">'+t.l+'</span><span class="ti-v">'+t.v+'</span><span class="ti-c '+(t.u?'up':'dn')+'">'+t.c+'</span></div>';
});

window.addEventListener('DOMContentLoaded',function(){
  var el=document.getElementById('tkinner');if(el)el.innerHTML=tkHTML;
  render();resetTimer();
});
</script>
